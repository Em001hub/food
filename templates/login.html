<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapCalorie - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #2d1b69 50%, #0f0f0f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(26, 15, 51, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(147, 112, 219, 0.4);
            border-radius: 25px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(147, 112, 219, 0.1) 0%, transparent 70%);
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }
        
        .logo h1 {
            color: #9370db;
            font-size: 3em;
            font-weight: 800;
            text-shadow: 0 0 30px rgba(147, 112, 219, 0.7);
            margin-bottom: 10px;
        }
        
        .logo p {
            color: #d8bfd8;
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
        }
        
        label {
            display: block;
            color: #d8bfd8;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 15px 20px;
            background: rgba(15, 15, 25, 0.8);
            border: 2px solid #4a2c8a;
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #9370db;
            box-shadow: 0 0 20px rgba(147, 112, 219, 0.4);
            background: rgba(20, 20, 35, 0.9);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #9370db, #8a2be2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn:hover {
            background: linear-gradient(135deg, #8a2be2, #9370db);
            box-shadow: 0 10px 25px rgba(147, 112, 219, 0.5);
            transform: translateY(-3px);
        }
        
        .switch-form {
            text-align: center;
            margin-top: 30px;
            color: #d8bfd8;
            position: relative;
            z-index: 2;
        }
        
        .switch-form a {
            color: #9370db;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }
        
        .switch-form a:hover {
            color: #ba55d3;
            text-shadow: 0 0 10px rgba(147, 112, 219, 0.5);
        }
        
        .flash-messages {
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
        }
        
        .flash-message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 600;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4444;
            color: #ff8888;
        }
        
        .success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #44ff44;
            color: #88ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>📸 SnapCalorie</h1>
            <p>Snap. Analyze. Track.</p>
        </div>
        
        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>
        
        <form method="POST">
            <input type="hidden" name="form_type" value="login">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required placeholder="Enter your username">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn">Login to SnapCalorie</button>
        </form>
        
        <div class="switch-form">
            <p>New to SnapCalorie? <a href="{{ url_for('signup') }}">Create Account</a></p>
        </div>
    </div>
</body>
</html>
