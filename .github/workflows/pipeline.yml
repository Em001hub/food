name: PipelineXR CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then
            echo "Installing root dependencies"
            npm install
          else
            echo "No root package.json found"
          fi

      - name: Install client dependencies
        run: |
          if [ -d client ]; then
            cd client
            npm install
          else
            echo "Client folder not found"
          fi

      - name: Build client
        run: |
          if [ -d client ]; then
            cd client
            npm run build || echo "No build script"
          fi

  security:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Security Scan
        run: |
          if [ -f package.json ]; then
            npm install
            npm audit --audit-level=high || true
          else
            echo "No backend dependencies to scan"
          fi

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      - name: Initialize database
        run: |
          if [ -f init-database.js ]; then
            node init-database.js
          else
            echo "No DB script"
          fi

      - name: Run tests
        run: |
          if [ -f package.json ]; then
            npm test || echo "No tests defined"
          fi
